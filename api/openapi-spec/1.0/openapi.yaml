openapi: 3.0.0
info:
  title: Pet Store API
  description: A template Pet Store API built with TypeSpec, oapi-codegen, and sqlc.
  version: '1.0'
tags: []
paths:
  /health:
    get:
      operationId: Health_healthCheck
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
  /pets:
    get:
      operationId: Pets_listPets
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PetPage'
    post:
      operationId: Pets_createPet
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPet'
  /pets/{petId}:
    get:
      operationId: Pets_getPet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: Pets_updatePet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePet'
    delete:
      operationId: Pets_deletePet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    NewPet:
      type: object
      required:
        - name
        - kind
        - age
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        kind:
          $ref: '#/components/schemas/PetKind'
        age:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
    Pet:
      type: object
      required:
        - id
        - name
        - kind
        - age
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        kind:
          $ref: '#/components/schemas/PetKind'
        age:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PetKind:
      type: string
      enum:
        - dog
        - cat
        - fish
        - bird
        - reptile
    PetPage:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Pet'
        nextCursor:
          type: string
    UpdatePet:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        kind:
          $ref: '#/components/schemas/PetKind'
        age:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
    Versions:
      type: string
      enum:
        - '1.0'
        - '2.0'
servers:
  - url: http://localhost:8080
    description: Local development server
    variables: {}
